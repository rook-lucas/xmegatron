<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>X MEGATRON — Session Linker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060606;--s1:#0d0d0d;--s2:#141414;--b1:#1c1c1c;--b2:#272727;--b3:#333;
      --text:#ebebeb;--dim:#aaa;--muted:#666;--ghost:#3a3a3a;--white:#fff;
      --blue:#1e90ff;--blue2:#4db8ff;--blue3:rgba(30,144,255,.12);
      --green:#1db954;--red:#e63946;--yellow:#f59e0b;--grad:linear-gradient(135deg,#1a6fd4,#1e90ff)}
    html,body{background:var(--bg);color:var(--text);font-family:"Syne",sans-serif;min-height:100vh}
    body::before{content:"";position:fixed;inset:0;opacity:.4;pointer-events:none;z-index:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E")}
    nav{position:sticky;top:0;z-index:200;height:56px;background:rgba(6,6,6,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-brand img{height:30px;filter:drop-shadow(0 0 8px rgba(77,184,255,.5))}
    .nav-brand-name{font-size:11px;font-weight:800;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,#fff,#4db8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-links{display:flex;align-items:center;gap:6px}
    .nav-link{padding:7px 13px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;border:1px solid var(--b2);color:var(--muted);transition:all .15s;font-family:"Syne",sans-serif;background:transparent;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
    .nav-link:hover{border-color:var(--blue);color:var(--blue2)}
    .nav-link.active{background:var(--s2);color:var(--text);border-color:var(--b3)}
    .nav-link.cta{background:var(--grad);border-color:transparent;color:#fff}
    .nav-link.cta:hover{opacity:.88}
    .btn{padding:10px 18px;border:none;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:"Syne",sans-serif;transition:opacity .15s,border-color .15s,color .15s;text-decoration:none}
    .btn-primary{background:var(--grad);color:#fff}
    .btn-primary:hover{opacity:.88}
    .btn-ghost{background:transparent;border:1px solid var(--b2);color:var(--muted)}
    .btn-ghost:hover{border-color:var(--blue);color:var(--blue2)}
    .btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.85}
    .btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.85}
    .btn-sm{padding:6px 11px;font-size:9px}
    .btn-full{width:100%;justify-content:center}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .field{margin-bottom:14px}
    .field-label{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:"Space Mono",monospace;margin-bottom:7px}
    .field-input{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--b2);color:var(--text);font-size:13px;font-family:"Space Mono",monospace;outline:none;transition:border-color .15s}
    .field-input:focus{border-color:var(--blue)}
    .field-input::placeholder{color:#282828}
    textarea.field-input{resize:vertical;min-height:78px;line-height:1.6}
    .panel{background:var(--s1);border:1px solid var(--b1);margin-bottom:16px}
    .panel-head{border-bottom:1px solid var(--b1);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .panel-title{font-size:13px;font-weight:700;color:var(--white)}
    .panel-body{padding:18px}
    .badge{display:inline-block;padding:2px 9px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:"Space Mono",monospace;border-radius:100px}
    .badge-blue{background:rgba(30,144,255,.13);color:var(--blue2);border:1px solid rgba(30,144,255,.28)}
    .badge-green{background:rgba(29,185,84,.11);color:var(--green);border:1px solid rgba(29,185,84,.28)}
    .badge-yellow{background:rgba(245,158,11,.11);color:var(--yellow);border:1px solid rgba(245,158,11,.28)}
    .badge-red{background:rgba(230,57,70,.11);color:var(--red);border:1px solid rgba(230,57,70,.28)}
    .badge-purple{background:rgba(139,92,246,.11);color:#a78bfa;border:1px solid rgba(139,92,246,.28)}
    .badge-dim{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--b2)}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.72)}}
    @keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    #toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--s1);border:1px solid var(--b2);padding:11px 16px;font-size:11px;color:var(--text);font-family:"Space Mono",monospace;min-width:180px;transform:translateY(60px);opacity:0;transition:all .22s;pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    #toast.s{border-left:3px solid var(--green)}
    #toast.e{border-left:3px solid var(--red)}

    body{display:flex;flex-direction:column;min-height:100vh}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 16px;position:relative;z-index:1}
    .wrap{width:100%;max-width:420px}

    .stats{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--b1);background:var(--s1);margin-bottom:16px}
    .stat{padding:13px 10px;text-align:center;border-right:1px solid var(--b1)}
    .stat:last-child{border-right:none}
    .stat-n{font-size:28px;font-weight:800;font-family:"Space Mono",monospace;line-height:1;
      background:linear-gradient(90deg,#fff,#4db8ff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      transition:transform .3s}
    .stat-n.pop{transform:scale(1.13)}
    .stat-l{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      color:var(--muted);font-family:"Space Mono",monospace;margin-top:4px}
    .stat-live{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:4px}
    .ldot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
    .ltxt{font-size:8px;color:var(--green);font-family:"Space Mono",monospace;letter-spacing:1px}

    .card{background:var(--s1);border:1px solid var(--b1)}
    .card-top{border-bottom:1px solid var(--b1);padding:16px 22px;display:flex;align-items:center;gap:12px}
    .card-title{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--white);margin-bottom:2px}
    .card-sub{font-size:10px;color:var(--muted);font-family:"Space Mono",monospace}
    .card-body{padding:22px}

    .toggle{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--b2);margin-bottom:20px}
    .topt{padding:10px;text-align:center;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;gap:6px;user-select:none}
    .topt:first-child{border-right:1px solid var(--b2)}
    .topt.on{background:var(--grad);color:#fff}
    .topt:hover:not(.on){background:var(--s2);color:var(--dim)}

    .ig{margin-bottom:14px}.ig.hidden{display:none}
    .ifield{width:100%;padding:12px 13px;background:var(--bg);border:1px solid var(--b2);color:var(--text);font-size:14px;font-family:"Space Mono",monospace;outline:none;transition:border-color .15s}
    .ifield:focus{border-color:var(--blue)}
    .ifield::placeholder{color:#252525}

    .gen-btn{width:100%;padding:13px;background:var(--grad);border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:"Syne",sans-serif;transition:opacity .15s;margin-bottom:16px}
    .gen-btn:hover{opacity:.88}
    .gen-btn.hidden{display:none}

    .loading{display:none;text-align:center;padding:16px 0}
    .spinner{width:22px;height:22px;border:2px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

    .code-box{background:var(--bg);border:1px solid var(--b2);padding:18px 14px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);word-break:break-word}
    .big-code{font-size:28px;font-weight:700;letter-spacing:6px;background:linear-gradient(90deg,#fff,#4db8ff 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    .err{display:flex;align-items:center;gap:6px;color:var(--red);font-size:12px}
    .ok{display:flex;align-items:center;gap:6px;color:var(--green);font-size:12px}

    .qr-box{background:var(--bg);border:1px solid var(--b2);padding:22px;text-align:center;margin-bottom:12px;display:none}
    .qr-img{width:200px;height:200px;display:block;margin:0 auto 12px;padding:10px;background:#fff}
    .qr-hint{font-size:10px;color:var(--muted);font-family:"Space Mono",monospace;line-height:1.8}

    .wait-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);font-family:"Space Mono",monospace;background:var(--bg);border:1px solid var(--b2);padding:9px 12px;margin-bottom:12px}

    .copy-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--b2);color:var(--muted);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:"Syne",sans-serif;transition:border-color .15s,color .15s}
    .copy-btn:hover{border-color:var(--blue);color:var(--blue2)}

    .foot{margin-top:20px;padding-top:16px;border-top:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted);font-family:"Space Mono",monospace}

    @media(max-width:440px){
      .nav-links .nav-link:not(.cta){display:none}
      .big-code{font-size:20px;letter-spacing:3px}
      .stat-n{font-size:22px}
    }
  </style>
</head>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
function toast(msg,type='s'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>t.className='',2800);}

// Stats
let lp=63,lq=06;
async function loadStats(){
  try{const d=(await axios.get('/api/stats')).data;
    const p=d.display_pair||70,q=d.display_qr||70;
    if(p!==lp){anim('sp',lp,p);lp=p}
    if(q!==lq){anim('sq',lq,q);lq=q}
  }catch(_){}
}
function anim(id,from,to){
  const el=document.getElementById(id);if(!el)return;
  const s=to>from?1:-1,diff=Math.abs(to-from);
  let c=from;const ti=setInterval(()=>{c+=s;el.textContent=c;if(c===to){clearInterval(ti);el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),300);}},diff>8?20:60);
}
loadStats();setInterval(loadStats,8000);

// Mode
let mode='pair',poll=null;
document.querySelectorAll('.topt').forEach(t=>{
  t.addEventListener('click',function(){
    const m=this.dataset.mode;if(m===mode)return;
    document.querySelectorAll('.topt').forEach(x=>x.classList.remove('on'));
    this.classList.add('on');mode=m;reset();
    if(m==='pair'){document.getElementById('gen-btn').innerHTML='<i class="fas fa-key"></i> Generate Pair Code';document.getElementById('gen-btn').classList.remove('hidden');document.getElementById('ig').classList.remove('hidden');}
    else{document.getElementById('gen-btn').classList.add('hidden');document.getElementById('ig').classList.add('hidden');doQR();}
  });
});

document.getElementById('gen-btn').addEventListener('click',doPair);

async function doPair(){
  const num=document.getElementById('num').value.trim();
  if(!num){setCode('<span class="err"><i class="fas fa-exclamation-circle"></i> Enter your WhatsApp number.</span>');return;}
  reset();showLoad(true);
  try{
    const r=await axios.get('/pair?number='+num.replace(/[^0-9]/g,''));
    showLoad(false);const code=r.data.code;
    if(!code||['invalid','failed','unavailable'].some(w=>code.toLowerCase().includes(w))){setCode('<span class="err"><i class="fas fa-exclamation-circle"></i> '+(code||'Failed.')+'</span>');}
    else{setCode('<div class="big-code">'+code+'</div>');if(r.data.token)startPoll(r.data.token,'pair');}
  }catch(e){showLoad(false);setCode('<span class="err"><i class="fas fa-exclamation-circle"></i> Error. Try again.</span>');}
}

async function doQR(){
  reset();showLoad(true);
  try{
    const r=await axios.get('/qr');showLoad(false);
    if(r.data.qr){
      document.getElementById('qr-img').src=r.data.qr;
      document.getElementById('qr-hint').innerHTML=(r.data.instructions||[]).join('<br>');
      document.getElementById('qr-box').style.display='block';
      document.getElementById('code-box').style.display='none';
      if(r.data.token)startPoll(r.data.token,'qr');
    }else{setCode('<span class="err"><i class="fas fa-exclamation-circle"></i> Failed to generate QR.</span>');}
  }catch(e){showLoad(false);setCode('<span class="err"><i class="fas fa-exclamation-circle"></i> Error.</span>');}
}

function startPoll(token,type){
  const wb=document.getElementById('wait-bar');const wt=document.getElementById('wait-txt');
  wb.style.display='flex';wt.textContent=type==='qr'?'Waiting for QR scan…':'Waiting for WhatsApp connection…';
  let att=0;clearInterval(poll);
  poll=setInterval(async()=>{
    att++;if(att>80){clearInterval(poll);return;}
    try{
      const ep=type==='qr'?'/qr/session-status':'/pair/session-status';
      const r=await axios.get(ep+'?token='+token);
      if(r.data.ready&&r.data.sessionId){clearInterval(poll);sessionDone(r.data.sessionId,type);}
    }catch(_){}
  },3000);
}

function sessionDone(sessionId,type){
  document.getElementById('qr-box').style.display='none';
  document.getElementById('code-box').style.display='flex';
  setCode('<span class="ok"><i class="fas fa-check-circle"></i> Connected! Session ID sent to your WhatsApp.</span>');
  document.getElementById('wait-bar').style.display='none';
  loadStats();
  toast('✓ Session created!','s');
}

function doCopy(){
  const t=document.getElementById('code-box').innerText.trim();
  if(!t||t.includes('appear')||t.includes('Error')||t.includes('Enter'))return;
  navigator.clipboard.writeText(t).then(()=>{
    toast('Copied!','s');
    const b=document.querySelector('.copy-btn');const o=b.innerHTML;
    b.innerHTML='<i class="fas fa-check"></i> Copied!';
    setTimeout(()=>b.innerHTML=o,2000);
  });
}
function setCode(html){const b=document.getElementById('code-box');b.style.display='flex';b.innerHTML=html;}
function showLoad(v){document.getElementById('loading').style.display=v?'block':'none';}
function reset(){clearInterval(poll);setCode('Your pair code will appear here');document.getElementById('qr-box').style.display='none';document.getElementById('wait-bar').style.display='none';showLoad(false);}
</script>
</body>
</html>
