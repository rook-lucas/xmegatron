services:
  - type: web
    name: x-megatron
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SESSION
        sync: false        # Your WhatsApp session ID
      - key: ADMIN_SECRET
        sync: false        # Admin panel password (default: xmg-admin-2025)
      - key: BOT_TOKEN
        sync: false        # Telegram bot token (optional)
